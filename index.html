<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseline Cinematic</title>
    <style>
        /* Dark Theme Styling */
        body { 
            background-color: #121212; 
            color: #f5f5f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        
        /* Hero Section */
        header { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
        }
        .hero-content { 
            z-index: 2; 
        }
        h1 { 
            font-size: 4rem; 
            margin-bottom: 10px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        p.tagline { 
            font-size: 1.5rem; 
            color: #ccc; 
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        
        /* Content Sections */
        section { 
            padding: 80px 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        h2 { 
            font-size: 2.5rem; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 40px; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            transition: transform 0.3s ease; 
        }
        .card:hover { 
            transform: translateY(-5px); 
        }
        .card h3 { 
            color: #fff; 
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        ul {
            line-height: 1.8;
            color: #ccc;
        }

        /* Image Slider Section */
        .slider-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
        .slider-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .img-before {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
            z-index: 2;
        }
        .img-after {
            z-index: 1;
        }
        .slider-input {
            position: absolute;
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            margin: 0;
            top: 0;
            left: 0;
            z-index: 10;
            cursor: pointer;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 4px;
            height: 100vh;
            background: #fff;
            cursor: ew-resize;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .slider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #d4af37;
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            color: #000;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .slider-handle::after {
            content: '↔';
            font-size: 20px;
        }
        .slider-label {
            position: absolute;
            bottom: 20px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            color: #fff;
